<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6 flex-shrink-0">
  <div>
    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Clientes</h2>
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-0.5">Gerencie sua base de clientes</p>
  </div>
  <button mat-flat-button class="sm:self-auto self-start" (click)="navigateTo(['/customers', 'new'])">
    <mat-icon>person_add</mat-icon>
    Novo Cliente
  </button>
</div>

<div class="bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col flex-1 min-h-0">
  <div class="px-4 pt-4 pb-1 border-b border-slate-100 flex-shrink-0">
    <mat-form-field appearance="outline" floatLabel="always" class="w-72">
      <mat-label>Buscar por nome</mat-label>
      <mat-icon matPrefix class="text-slate-400">search</mat-icon>
      <input matInput [formControl]="searchControl" placeholder="Digite o nome..." />
    </mat-form-field>
  </div>
  <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">

  @if (loading()) {
    <div class="p-4">
      <app-skeleton-table [rows]="5" [cols]="5" />
    </div>
  } @else {
    <table mat-table [dataSource]="customers()" class="w-full">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let c" class="!font-semibold !text-slate-800">{{ c.fullName }}</td>
      </ng-container>

      <ng-container matColumnDef="document">
        <th mat-header-cell *matHeaderCellDef>Documento</th>
        <td mat-cell *matCellDef="let c" class="!font-mono !text-slate-500">
          {{ c.document ? c.document.value : '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let c">{{ c.email ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="phones">
        <th mat-header-cell *matHeaderCellDef>Telefone</th>
        <td mat-cell *matCellDef="let c" class="!font-mono">
          {{ c.phoneFormatted }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="w-36"></th>
        <td mat-cell *matCellDef="let c" class="!whitespace-nowrap">
          <button mat-icon-button matTooltip="Ver detalhe" (click)="navigateTo(['/customers', c.id])">
            <mat-icon class="!text-slate-500">visibility</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Editar" (click)="navigateTo(['/customers', c.id, 'edit'])">
            <mat-icon class="!text-slate-500">edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Excluir" (click)="confirmDelete(c)">
            <mat-icon class="!text-slate-500">delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="columns.length">
          <div class="flex flex-col items-center justify-center py-12 gap-2 text-slate-400">
            <mat-icon class="!text-4xl text-slate-200">people</mat-icon>
            <p class="text-sm">Nenhum cliente encontrado.</p>
          </div>
        </td>
      </tr>
    </table>

  }
  </div>
  <div class="border-t border-slate-100 flex-shrink-0">
    <app-pagination
      [total]="total()"
      [page]="page()"
      [pageSize]="pageSize()"
      (pageChange)="onPageChange($event)"
    />
  </div>
</div>
