<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-semibold">Clientes</h2>
  <button mat-flat-button (click)="navigateTo(['/customers', 'new'])">
    <mat-icon>add</mat-icon>
    Novo Cliente
  </button>
</div>

<mat-form-field appearance="outline" class="w-full mb-4">
  <mat-label>Buscar por nome</mat-label>
  <mat-icon matPrefix>search</mat-icon>
  <input matInput [formControl]="searchControl" placeholder="Digite o nome..." />
</mat-form-field>

@if (loading()) {
  <app-skeleton-table [rows]="5" [cols]="5" />
} @else {
  <div class="mat-elevation-z1 rounded overflow-hidden">
    <table mat-table [dataSource]="customers()" class="w-full">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let c">{{ c.name }}</td>
      </ng-container>

      <ng-container matColumnDef="document">
        <th mat-header-cell *matHeaderCellDef>Documento</th>
        <td mat-cell *matCellDef="let c">
          {{ c.document ? c.document.value : '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let c">{{ c.email ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="phones">
        <th mat-header-cell *matHeaderCellDef>Telefone</th>
        <td mat-cell *matCellDef="let c">
          {{ c.phones.length ? c.phones[0].value : '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="w-32"></th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button matTooltip="Ver detalhe" (click)="navigateTo(['/customers', c.id])">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Editar" (click)="navigateTo(['/customers', c.id, 'edit'])">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Excluir" color="warn" (click)="confirmDelete(c)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center py-8 text-gray-500" [attr.colspan]="columns.length">
          Nenhum cliente encontrado.
        </td>
      </tr>
    </table>
  </div>

  <app-pagination
    [total]="total()"
    [page]="page()"
    [pageSize]="pageSize()"
    (pageChange)="onPageChange($event)"
  />
}
