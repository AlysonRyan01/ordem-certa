<div class="admin-login-page">
  <div class="grid-overlay"></div>

  <div class="login-card">
    <div class="card-header">
      <div class="logo-mark">
        <span class="logo-icon">⚙</span>
      </div>
      <h1 class="title">OrdemCerta</h1>
      <p class="subtitle">Painel Administrativo</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="login()" class="login-form">
      <mat-form-field appearance="outline" class="admin-field">
        <mat-label>E-mail</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="email" />
        <mat-icon matPrefix>alternate_email</mat-icon>
        @if (form.get('email')!.hasError('required')) {
          <mat-error>E-mail obrigatório.</mat-error>
        }
        @if (form.get('email')!.hasError('email')) {
          <mat-error>E-mail inválido.</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="admin-field">
        <mat-label>Senha</mat-label>
        <input
          matInput
          formControlName="password"
          [type]="hidePassword() ? 'password' : 'text'"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock_outline</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword.set(!hidePassword())"
        >
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (form.get('password')!.hasError('required')) {
          <mat-error>Senha obrigatória.</mat-error>
        }
      </mat-form-field>

      <button
        mat-flat-button
        type="submit"
        class="login-btn"
        [disabled]="form.invalid || saving()"
      >
        @if (saving()) {
          <mat-spinner diameter="20" />
        } @else {
          <ng-container>
            <mat-icon>login</mat-icon>
            Entrar
          </ng-container>
        }
      </button>
    </form>
  </div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  .admin-login-page {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #090c10;
    position: relative;
    overflow: hidden;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    margin: 1.5rem;
    padding: 2.5rem;
    background: #0d1117;
    border: 1px solid rgba(0, 212, 255, 0.15);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0, 212, 255, 0.05),
      0 24px 64px rgba(0, 0, 0, 0.6),
      0 0 80px rgba(0, 212, 255, 0.04) inset;
    animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 4px;
    margin-bottom: 1rem;
  }

  .logo-icon {
    font-size: 1.5rem;
    filter: hue-rotate(180deg) saturate(2);
  }

  .title {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: #e8eaf0;
    letter-spacing: 0.05em;
    margin: 0 0 0.25rem;
  }

  .subtitle {
    font-size: 0.8rem;
    color: #00d4ff;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin: 0;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .admin-field {
    width: 100%;
  }

  /* Material overrides for dark admin theme */
  .admin-login-page ::ng-deep .mat-mdc-form-field {
    --mdc-outlined-text-field-outline-color: rgba(255,255,255,0.1);
    --mdc-outlined-text-field-hover-outline-color: rgba(0, 212, 255, 0.4);
    --mdc-outlined-text-field-focus-outline-color: #00d4ff;
    --mdc-outlined-text-field-label-text-color: rgba(255,255,255,0.5);
    --mdc-outlined-text-field-input-text-color: #e8eaf0;
    --mdc-outlined-text-field-container-shape: 4px;
  }

  .admin-login-page ::ng-deep .mat-mdc-form-field-icon-prefix,
  .admin-login-page ::ng-deep .mat-mdc-form-field-icon-suffix {
    color: rgba(255,255,255,0.3);
  }

  .login-btn {
    margin-top: 0.75rem;
    height: 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: #00d4ff !important;
    color: #090c10 !important;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: opacity 0.2s;
  }

  .login-btn:disabled {
    opacity: 0.5;
  }

  .login-btn:not(:disabled):hover {
    opacity: 0.9;
  }
</style>
