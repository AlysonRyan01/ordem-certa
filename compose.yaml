services:
  ordemcerta.db:
    image: postgres:16-alpine
    container_name: ordemcerta-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ordemcerta}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ordemcerta-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ordemcerta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ordemcerta-network

  ordemcerta.presentation:
    image: ordemcerta.presentation
    container_name: ordemcerta-api
    build:
      context: .
      dockerfile: src/OrdemCerta.Presentation/Dockerfile.dev
    ports:
      - "${API_PORT:-5001}:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Host=ordemcerta.db;Port=5432;Database=${POSTGRES_DB:-ordemcerta};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - App__BaseUrl=${APP_BASEURL:-http://localhost:5001}
      - Jwt__SecretKey=${JWT_SECRET:-TROQUE_ESTA_CHAVE_POR_UMA_SECRETA_DE_32_CARACTERES_OU_MAIS}
      - Jwt__ExpirationHours=${JWT_EXPIRATION_HOURS:-24}
      - EvolutionApi__BaseUrl={EVOLUTIONAPI_BASEURL}
      - EvolutionApi__ApiKey=${EVOLUTIONAPI_APIKEY:-dev-key}
      - EvolutionApi__Instance=${EVOLUTIONAPI_INSTANCE:-ordemcerta}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - Stripe__PriceId=${STRIPE_PRICE_ID}
    volumes:
      - ./src:/app/src
      - /app/src/OrdemCerta.Presentation/bin
      - /app/src/OrdemCerta.Presentation/obj
      - /app/src/OrdemCerta.Application/bin
      - /app/src/OrdemCerta.Application/obj
      - /app/src/OrdemCerta.Domain/bin
      - /app/src/OrdemCerta.Domain/obj
      - /app/src/OrdemCerta.Infrastructure/bin
      - /app/src/OrdemCerta.Infrastructure/obj
      - /app/src/OrdemCerta.Shared/bin
      - /app/src/OrdemCerta.Shared/obj
    depends_on:
      ordemcerta.db:
        condition: service_healthy
    networks:
      - ordemcerta-network

  ordemcerta.frontend:
    image: ordemcerta.frontend
    container_name: ordemcerta-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3000}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      ordemcerta.presentation:
        condition: service_started
    networks:
      - ordemcerta-network

volumes:
  ordemcerta-db-data:
    driver: local

networks:
  ordemcerta-network:
    driver: bridge