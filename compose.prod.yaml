services:
  ordemcerta.db:
    image: postgres:16-alpine
    container_name: ordemcerta-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ordemcerta}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ordemcerta-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ordemcerta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ordemcerta-network

  ordemcerta.presentation:
    image: ordemcerta.presentation
    container_name: ordemcerta-api
    build:
      context: .
      dockerfile: src/OrdemCerta.Presentation/Dockerfile 
    ports:
      - "${API_PORT:-5001}:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Host=ordemcerta.db;Port=5432;Database=${POSTGRES_DB:-ordemcerta};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - App__BaseUrl=${APP_BASEURL:-http://localhost:5001}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__ExpirationHours=${JWT_EXPIRATION_HOURS:-24}
      - EvolutionApi__BaseUrl=http://evolution-api:8080
      - EvolutionApi__ApiKey=${EVOLUTIONAPI_APIKEY}
      - EvolutionApi__Instance=${EVOLUTIONAPI_INSTANCE:-ordemcerta}
      - Cors__PolicyName=${ORDEMCERTA_CORS_POLICYNAME:-DefaultPolicy}
      - Cors__Origins=${ORDEMCERTA_CORS_ORIGINS}
    depends_on:
      ordemcerta.db:
        condition: service_healthy
    networks:
      - ordemcerta-network

  ordemcerta.frontend:
    image: ordemcerta.frontend
    container_name: ordemcerta-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:4200"
    depends_on:
      ordemcerta.presentation:
        condition: service_started
    networks:
      - ordemcerta-network

volumes:
  ordemcerta-db-data:
    driver: local

networks:
  ordemcerta-network:
    driver: bridge